<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WMATA Train Map</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.28/"></script>
  <style>
    html, body, #viewDiv {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>
  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GraphicsLayer",
      "esri/layers/FeatureLayer",
      "esri/Graphic"
    ], function (Map, MapView, GraphicsLayer, FeatureLayer, Graphic) {

      var LINE_COLORS = {
        red:    "#E51636",
        blue:   "#0795D3",
        green:  "#00B140",
        orange: "#ED8B00",
        silver: "#A2A4A1",
        yellow: "#FFD100",
        RD: "#E51636",
        BL: "#0795D3",
        GR: "#00B140",
        OR: "#ED8B00",
        SV: "#A2A4A1",
        YL: "#FFD100"
      };

      var linesLayer = new GraphicsLayer();
      var trainsLayer = new GraphicsLayer();

      var map = new Map({
        basemap: "dark-gray-vector",
        layers: [linesLayer]
      });

      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-77.04, 38.9],
        zoom: 12
      });

      // Load metro lines from GeoJSON
      fetch("/data/Metro_Lines_Regional.geojson")
        .then(function (res) { return res.json(); })
        .then(function (geojson) {
          geojson.features.forEach(function (feature) {
            var name = feature.properties.NAME;
            var color = LINE_COLORS[name] || "#FFFFFF";
            var coords = feature.geometry.coordinates;

            var graphic = new Graphic({
              geometry: {
                type: "polyline",
                paths: [coords]
              },
              symbol: {
                type: "simple-line",
                color: color,
                width: 3
              }
            });
            linesLayer.add(graphic);
          });
        })
        .catch(function (err) {
          console.error("Failed to load metro lines:", err);
        });

      // Load stations as a client-side FeatureLayer with labels
      fetch("/api/stations")
        .then(function (res) { return res.json(); })
        .then(function (stations) {
          var features = stations.map(function (station, i) {
            return new Graphic({
              geometry: {
                type: "point",
                longitude: station.Lon,
                latitude: station.Lat
              },
              attributes: {
                ObjectID: i,
                Name: station.Name,
                Code: station.Code,
                LineCode1: station.LineCode1 || ""
              }
            });
          });

          var stationsLayer = new FeatureLayer({
            source: features,
            objectIdField: "ObjectID",
            fields: [
              { name: "ObjectID", type: "oid" },
              { name: "Name", type: "string" },
              { name: "Code", type: "string" },
              { name: "LineCode1", type: "string" }
            ],
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                color: "#FFFFFF",
                size: 6,
                outline: { color: "#000000", width: 1 }
              }
            },
            labelingInfo: [{
              labelExpressionInfo: { expression: "$feature.Name" },
              symbol: {
                type: "text",
                color: "#FFFFFF",
                haloColor: "#000000",
                haloSize: 1,
                font: { size: 9, weight: "bold" }
              },
              labelPlacement: "above-right",
              minScale: 150000
            }]
          });

          map.add(stationsLayer);
          // Trains on top of stations
          map.add(trainsLayer);
        })
        .catch(function (err) {
          console.error("Failed to load stations:", err);
          // Still add trains layer even if stations fail
          map.add(trainsLayer);
        });

      // Track train graphics by TrainId
      var trainGraphics = {};

      // Connect to WebSocket
      var wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
      var ws = new WebSocket(wsProtocol + "//" + location.host);

      ws.onmessage = function (event) {
        var trains = JSON.parse(event.data);

        trains.forEach(function (train) {
          var id = train.TrainId;
          var color = LINE_COLORS[train.LineCode] || "#888888";
          var point = {
            type: "point",
            longitude: train.location.longitude,
            latitude: train.location.latitude
          };

          if (trainGraphics[id]) {
            trainGraphics[id].geometry = point;
            trainGraphics[id].symbol = {
              type: "simple-marker",
              color: color,
              size: 8,
              outline: { color: "#FFFFFF", width: 1 }
            };
          } else {
            var graphic = new Graphic({
              geometry: point,
              symbol: {
                type: "simple-marker",
                color: color,
                size: 8,
                outline: { color: "#FFFFFF", width: 1 }
              }
            });
            trainGraphics[id] = graphic;
            trainsLayer.add(graphic);
          }
        });
      };

      ws.onclose = function () {
        console.log("WebSocket closed");
      };

      ws.onerror = function (err) {
        console.error("WebSocket error:", err);
      };
    });
  </script>
</body>
</html>
