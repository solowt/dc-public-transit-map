<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DC Transit Map</title>
    <link rel="icon" href="/favicon.svg?v=12" type="image/svg+xml">
    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.34/esri/themes/dark/main.css"
    />
    <script src="https://js.arcgis.com/4.34/"></script>
    <script type="module" src="https://js.arcgis.com/calcite-components/5.0"></script>
    <script type="module" src="https://js.arcgis.com/4.34/map-components/"></script>
    <style>
      :root {
        --sheet-peek: 34px;
        --sheet-min: 200px;
        --sheet-mid: 50vh;
        --sheet-max: 85vh;
        --sheet-full: 100vh;
      }
      html, body, #viewDiv {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      /* styles for small screens */
      @media (max-width: 768px) {
        #viewDiv {
          height: auto;
          flex: 1;
        }
        body {
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          align-items: stretch;
        }
        .panel-holder {
          overscroll-behavior: contain;
          max-height: var(--sheet-full);
          min-height: var(--sheet-peek);
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }
        .panel-holder > calcite-panel {
          flex: 1;
          overflow-y: auto;
        }
        div.sheet-handle {
          height: 34px;
          display: grid;
          place-items: center;
          cursor: grab;
          user-select: none;
          -webkit-user-select: none;
          touch-action: none;
          background: #373938;
          flex-shrink: 0;
        }
        .sheet-handle::before {
          content: "";
          width: 44px;
          height: 5px;
          border-radius: 999px;
          background: rgba(255,255,255,.3);
        }
      }
      .sheet-handle {
        display: none;
      }
      @media (min-width: 769px) {
        .panel-holder {
          position: fixed;
          top: 15px;
          right: 15px;
          width: 300px;
          z-index: 1;
        }
      }
      .layers-panel calcite-tabs {
        padding-bottom: 1rem;
      }
      .layer-tab-content {
        display: flex;
        align-items: center;
        gap: .5rem;
        padding: 1rem 1rem 1rem 1rem;
        --calcite-label-margin-bottom: 0;
      }
      .status {
        border-radius: 50%;
        height: .75rem;
        width: .75rem;
      }
      .status.live {
        background: #66bb6a;
        color: #66bb6a;
      }
      .status.connecting {
        background: #ffa726;
        color: #ffa726;
      }
      .status.off {
        background: #888;
        color: #888;
      }
      .status.disconnected {
        background: #ef5350;
        color: #ef5350;
      }
      .status.reconnecting {
        background: #ffa726;
        color: #ffa726;
      }
      .status.flashing {
        filter: drop-shadow(0 0 0px currentColor)
          drop-shadow(0 0 0px currentColor)
          drop-shadow(0 0 10px currentColor);
      }
      .count {
        font-size: 12px;
        color: #999;
        margin-left: 4px;
      }
      #stationSearch, #busRouteSearch {
        margin-left: 1rem;
        margin-right: 1rem;
      }
      #stationDetails, #busRouteDetails {
        padding: 1rem 1rem 0 1rem;
        --calcite-label-margin-bottom: 0;
      }
      #aboutNotice {
        display: none;
        position: fixed;
        bottom: 50%;
        left: 15px;
        right: 15px;
        z-index: 2;
      }
      .arrival-line {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      .arrival-min {
        font-weight: bold;
      }
      .text-ellipsis {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body class="calcite-mode-dark">
    <div id="keyboard-dismiss"
       tabindex="-1"
       style="position:fixed; top:0; left:0; width:1px; height:1px; opacity:0;">
    </div>
    <arcgis-map id="viewDiv" basemap="dark-gray-vector" center="-77.04,38.9" zoom="12">
      <arcgis-locate slot="bottom-left"></arcgis-locate>
    </arcgis-map>
    <calcite-notice id="aboutNotice" closable icon="map" scale="l" width="auto">
      <span slot="title">DC Transit Map</span>
      <span slot="message">Real-time train and bus positions via WMATA's API. Use the tools to toggle vehicles, search for stations and routes, and toggle entrances and bus stops.</span>
    </calcite-notice>
    <div class="panel-holder">
      <div class="sheet-handle"></div>
      <calcite-panel scale="l" class="layers-panel" style="--calcite-panel-width: 260px;">
        <calcite-tabs scale="l">
          <calcite-tab-nav slot="title-group">
            <calcite-tab-title selected>Trains</calcite-tab-title>
            <calcite-tab-title class="bus-tab-title">Buses</calcite-tab-title>
          </calcite-tab-nav>
          <calcite-tab selected>
            <div class="layer-tab-content">
              <calcite-label layout="inline">
                <calcite-checkbox class="trains-check"></calcite-checkbox>
                Show trains
              </calcite-label>
              <span id="trainCount" class="count"></span>
              <span id="trainStatus" class="status connecting"></span>
            </div>
            <calcite-combobox id="stationSearch" placeholder="Search stations" selection-mode="single">
            </calcite-combobox>
            <div id="stationDetails" style="display:none;">
              <div style="display:flex; align-items:center; justify-content:space-between; padding: 8px 12px;">
                <calcite-label layout="inline" style="margin:0;">
                  <calcite-switch id="entrancesToggle"></calcite-switch>
                  Show entrances
                </calcite-label>
                <calcite-button id="gotoStation" appearance="transparent" icon-start="pin" scale="s" kind="neutral">Station</calcite-button>
              </div>
              <div id="arrivalsContainer"></div>
            </div>
          </calcite-tab>
          <calcite-tab>
            <div class="layer-tab-content">
              <calcite-label layout="inline">
                <calcite-checkbox class="buses-check"></calcite-checkbox>
                Show buses
              </calcite-label>
              <span id="busCount" class="count"></span>
              <span id="busStatus" class="status off"></span>
            </div>
            <calcite-combobox id="busRouteSearch" placeholder="Filter by route" selection-mode="single" style="display:none">
            </calcite-combobox>
            <div id="busRouteDetails" style="display:none;">
              <div style="display:flex; align-items:center; justify-content:space-between; padding: 8px 12px;">
                <calcite-label layout="inline" style="margin:0;">
                  <calcite-switch id="busStopsToggle"></calcite-switch>
                  Show stops
                </calcite-label>
                <calcite-button id="gotoBusRoute" appearance="transparent" icon-start="pin" scale="s" kind="neutral">Buses</calcite-button>
              </div>
            </div>
          </calcite-tab>
        </calcite-tabs>
      </calcite-panel>
    </div>
    <script type="module">
      // --- Token management ---
      let accessToken = null;
      let refreshPromise = null;

      async function fetchToken() {
        const res = await fetch("/auth/token", { method: "POST" });
        const data = await res.json();
        accessToken = data.token;
      }

      async function refreshToken() {
        if (refreshPromise) return refreshPromise;
        refreshPromise = (async () => {
          try {
            const res = await fetch("/auth/refresh", { method: "POST", credentials: "same-origin" });
            if (res.ok) {
              const data = await res.json();
              accessToken = data.token;
            } else {
              await fetchToken();
            }
          } catch {
            await fetchToken();
          } finally {
            refreshPromise = null;
          }
        })();
        return refreshPromise;
      }

      async function authFetch(url, options = {}) {
        const headers = { ...options.headers, Authorization: `Bearer ${accessToken}` };
        let res = await fetch(url, { ...options, headers });
        if (res.status === 401) {
          await refreshToken();
          headers.Authorization = `Bearer ${accessToken}`;
          res = await fetch(url, { ...options, headers });
        }
        return res;
      }

      export function debounce(fn, wait, immediate = false) {
        let timeout;

        return function (...args) {
          const context = this;
          const callNow = immediate && !timeout;

          clearTimeout(timeout);

          timeout = setTimeout(() => {
            timeout = null;
            if (!immediate) fn.apply(context, args);
          }, wait);

          if (callNow) fn.apply(context, args);
        };
      }

      const [_, [GraphicsLayer, FeatureLayer, Graphic, reactiveUtils]] = await Promise.all([fetchToken(), $arcgis.import([
          "@arcgis/core/layers/GraphicsLayer.js",
          "@arcgis/core/layers/FeatureLayer.js",
          "@arcgis/core/Graphic.js",
          "@arcgis/core/core/reactiveUtils.js",
        ])
      ]);

      const LINE_COLORS = {
            red: "#E51636",
            blue: "#0795D3",
            green: "#00B140",
            orange: "#ED8B00",
            silver: "#A2A4A1",
            yellow: "#FFD100",
            RD: "#E51636",
            BL: "#0795D3",
            GR: "#00B140",
            OR: "#ED8B00",
            SV: "#A2A4A1",
            YL: "#FFD100",
          };

          const LINE_RGBA = {
            red:    [229, 22, 54, 255],
            blue:   [7, 149, 211, 255],
            green:  [0, 177, 64, 255],
            orange: [237, 139, 0, 255],
            silver: [162, 164, 161, 255],
            yellow: [255, 209, 0, 255],
          };

          const LINE_NAMES = { RD: "Red", BL: "Blue", GR: "Green", OR: "Orange", SV: "Silver", YL: "Yellow" };

          const LINE_SPACING = 3; // points between adjacent line centers

          const makeLineSymbol = (lineNames) => {
            if (lineNames.length === 1) {
              return {
                type: "simple-line",
                color: LINE_COLORS[lineNames[0]],
                width: 3,
              };
            }
            const n = lineNames.length;
            const totalSpan = (n - 1) * LINE_SPACING;
            const symbolLayers = lineNames.map((name, i) => ({
              type: "CIMSolidStroke",
              width: 3,
              color: LINE_RGBA[name],
              effects: [{
                type: "CIMGeometricEffectOffset",
                offset: -totalSpan / 2 + i * LINE_SPACING,
                method: "Rounded",
                option: "Fast",
              }],
            }));
            return {
              type: "cim",
              data: {
                type: "CIMSymbolReference",
                symbol: {
                  type: "CIMLineSymbol",
                  symbolLayers,
                },
              },
            };
          };

          function hexToRgba(hex) {
            return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16), 255];
          }

          // CIM geometry rings stored as flat [x,y,x,y,...] arrays for compactness
          const BODY_RINGS_FLAT = [
            [555,768, 768,768, 768,597, 555,597, 555,597, 555,768],
            [256,768, 469,768, 469,597, 256,597, 256,768],
            [704,299, 679,304, 659,317, 645,338, 640,363, 645,387, 659,408, 679,422, 704,427, 729,422, 749,408, 763,387, 768,363, 763,338, 749,317, 729,304, 704,299],
            [320,299, 295,304, 275,317, 261,338, 256,363, 261,387, 275,408, 295,422, 320,427, 345,422, 365,408, 379,387, 384,363, 379,338, 365,317, 345,304, 320,299],
            [351,128, 436,213, 597,213, 683,128, 768,128, 768,149, 704,213, 733,216, 761,225, 787,238, 810,257, 828,280, 842,306, 850,334, 853,363, 853,768, 848,811, 833,848, 808,877, 773,901, 727,918, 670,930, 600,937, 512,939, 512,939, 427,936, 358,929, 300,917, 254,899, 217,875, 191,846, 176,810, 171,768, 171,363, 174,334, 182,306, 196,280, 214,257, 237,238, 263,225, 291,216, 320,213, 256,149, 256,128, 351,128],
          ];
          const ARROW_RINGS_FLAT = [
            [160,120, 283,1, 320,37, 320,37, 283,73, 283,73, 160,193, 37,73, 37,73, 0,37, 37,1, 160,120],
          ];
          const toRings = (flat) => flat.map(r => {
            const pts = [];
            for (let i = 0; i < r.length; i += 2) pts.push([r[i], r[i + 1]]);
            return pts;
          });
          const BODY_RINGS = toRings(BODY_RINGS_FLAT);
          const ARROW_RINGS = toRings(ARROW_RINGS_FLAT);

          const makeClipRect = (w, h) => ({
            type: "CIMClippingPath", clippingType: "Intersect",
            path: { rings: [[[0,0],[w,0],[w,h],[0,h],[0,0]]] },
          });

          const makeMarkerLayer = (size, frame, rings, symbol, extras = {}) => ({
            type: "CIMVectorMarker", enable: true, anchorPointUnits: "Relative",
            dominantSizeAxis3D: "Z", billboardMode3D: "FaceNearPlane",
            size, frame, scaleSymbolsProportionally: true, respectFrame: true,
            clippingPath: makeClipRect(frame.xmax, frame.ymax),
            markerGraphics: [{ type: "CIMMarkerGraphic", geometry: { rings }, symbol }],
            ...extras,
          });

          const makeCIMTrainSymbol = (hex) => {
            const rgba = hexToRgba(hex);
            const polySymbol = (strokeW) => ({
              type: "CIMPolygonSymbol",
              symbolLayers: [
                { type: "CIMSolidStroke", enable: true, color: [255,255,255,255], width: strokeW },
                { type: "CIMSolidFill", enable: true, color: rgba },
              ],
            });
            return {
              type: "cim",
              data: {
                type: "CIMSymbolReference",
                symbol: {
                  type: "CIMPointSymbol",
                  symbolLayers: [
                    makeMarkerLayer(20, { xmin: 0, ymin: 0, xmax: 1024, ymax: 1024 }, BODY_RINGS, polySymbol(40)),
                    makeMarkerLayer(7, { xmin: 0, ymin: 0, xmax: 320, ymax: 193 }, ARROW_RINGS, polySymbol(30), {
                      anchorPoint: { x: 0, y: -2 }, primitiveName: "arrow",
                    }),
                  ],
                },
                primitiveOverrides: [{
                  type: "CIMPrimitiveOverride", primitiveName: "arrow", propertyName: "Rotation",
                  valueExpressionInfo: { type: "CIMExpressionInfo", expression: "-$feature.Heading", returnType: "Default" },
                }],
              },
            };
          };

          const linesLayer = new GraphicsLayer();
          const busRouteLayer = new GraphicsLayer();

          // --- Bus FeatureLayer ---
          const busesLayer = new FeatureLayer({
            source: [],
            objectIdField: "ObjectID",
            geometryType: "point",
            spatialReference: { wkid: 4326 },
            visible: false,
            fields: [
              { name: "ObjectID", type: "oid" },
              { name: "VehicleID", type: "string" },
              { name: "RouteID", type: "string" },
              { name: "RouteName", type: "string" },
              { name: "LineDescription", type: "string" },
              { name: "DirectionText", type: "string" },
              { name: "TripHeadsign", type: "string" },
              { name: "Deviation", type: "double" },
              { name: "DateTime", type: "string" },
            ],
            popupTemplate: {
              title: "Bus {RouteID} — {RouteName}",
              content: [
                {
                  type: "fields",
                  fieldInfos: [
                    { fieldName: "VehicleID", label: "Vehicle ID" },
                    { fieldName: "RouteID", label: "Route" },
                    { fieldName: "RouteName", label: "Route Name" },
                    { fieldName: "LineDescription", label: "Line" },
                    { fieldName: "DirectionText", label: "Direction" },
                    { fieldName: "TripHeadsign", label: "Headsign" },
                    {
                      fieldName: "Deviation",
                      label: "Deviation (min)",
                    },
                    { fieldName: "DateTime", label: "Last Updated" },
                  ],
                },
              ],
            },
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                color: "#00B140",
                path: "M18,11H6V6H18M16.5,17A1.5,1.5 0 0,1 15,15.5A1.5,1.5 0 0,1 16.5,14A1.5,1.5 0 0,1 18,15.5A1.5,1.5 0 0,1 16.5,17M7.5,17A1.5,1.5 0 0,1 6,15.5A1.5,1.5 0 0,1 7.5,14A1.5,1.5 0 0,1 9,15.5A1.5,1.5 0 0,1 7.5,17M4,16C4,16.88 4.39,17.67 5,18.22V20A1,1 0 0,0 6,21H7A1,1 0 0,0 8,20V19H16V20A1,1 0 0,0 17,21H18A1,1 0 0,0 19,20V18.22C19.61,17.67 20,16.88 20,16V6C20,2.5 16.42,2 12,2C7.58,2 4,2.5 4,6V16Z",
                size: 14,
                outline: { color: "#FFFFFF", width: 1 },
              },
            },
          });

          // --- Train FeatureLayer ---
          const trainsLayer = new FeatureLayer({
            source: [],
            objectIdField: "ObjectID",
            geometryType: "point",
            spatialReference: { wkid: 4326 },
            fields: [
              { name: "ObjectID", type: "oid" },
              { name: "TrainId", type: "string" },
              { name: "TrainNumber", type: "string" },
              { name: "CarCount", type: "integer" },
              { name: "DirectionNum", type: "integer" },
              { name: "CircuitId", type: "integer" },
              { name: "DestinationStationCode", type: "string" },
              { name: "LineCode", type: "string" },
              { name: "SecondsAtLocation", type: "integer" },
              { name: "ServiceType", type: "string" },
              { name: "Heading", type: "double" },
            ],
            popupTemplate: {
              title: "Train {TrainId}",
              content: [
                {
                  type: "fields",
                  fieldInfos: [
                    { fieldName: "TrainId", label: "Train ID" },
                    { fieldName: "TrainNumber", label: "Train Number" },
                    { fieldName: "LineCode", label: "Line" },
                    { fieldName: "CarCount", label: "Cars" },
                    { fieldName: "DirectionNum", label: "Direction" },
                    { fieldName: "CircuitId", label: "Circuit ID" },
                    {
                      fieldName: "DestinationStationCode",
                      label: "Destination",
                    },
                    {
                      fieldName: "SecondsAtLocation",
                      label: "Seconds at Location",
                    },
                    { fieldName: "ServiceType", label: "Service Type" },
                    {
                      fieldName: "Heading",
                      label: "Heading",
                      format: { digitSeparator: false, places: 1 },
                    },
                  ],
                },
              ],
            },
            renderer: {
              type: "unique-value",
              field: "LineCode",
              defaultSymbol: makeCIMTrainSymbol("#000000"),
              uniqueValueInfos: [
                { value: "RD", symbol: makeCIMTrainSymbol("#E51636") },
                { value: "BL", symbol: makeCIMTrainSymbol("#0795D3") },
                { value: "GR", symbol: makeCIMTrainSymbol("#00B140") },
                { value: "OR", symbol: makeCIMTrainSymbol("#ED8B00") },
                { value: "SV", symbol: makeCIMTrainSymbol("#A2A4A1") },
                { value: "YL", symbol: makeCIMTrainSymbol("#FFD100") },
              ]
            },
          });

          const stationsLayer = new FeatureLayer({
            source: [],
            geometryType: "point",
            objectIdField: "ObjectID",
            spatialReference: { wkid: 4326 },
            fields: [
              { name: "ObjectID", type: "oid" },
              { name: "Name", type: "string" },
              { name: "Code", type: "string" },
              { name: "LineCode1", type: "string" },
              { name: "LineCode2", type: "string" },
              { name: "LineCode3", type: "string" },
              { name: "LineCode4", type: "string" },
              { name: "Address", type: "string" },
            ],
            popupTemplate: {
              title: "{Name}",
              content: "{Address}",
            },
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                color: "#FFFFFF",
                size: 12,
                outline: { color: "#000000", width: 1 },
              },
            },
            labelingInfo: [{
              labelExpressionInfo: { expression: "$feature.Name" },
              symbol: {
                type: "text",
                color: "#FFFFFF",
                haloColor: "#000000",
                haloSize: 1,
                font: { size: 9, weight: "bold" },
              },
              labelPlacement: "above-right",
              minScale: 150000,
            }],
          });

          const entrancesLayer = new FeatureLayer({
            visible: false,
            source: [],
            objectIdField: "ObjectID",
            geometryType: "point",
            spatialReference: { wkid: 4326 },
            popupEnabled: false,
            fields: [
              { name: "ObjectID", type: "oid" },
              { name: "Name", type: "string" },
              { name: "Description", type: "string" },
            ],
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                color: "#81D4FA",
                size: 7,
                outline: { color: "transparent", width: 0 },
              },
            },
            labelingInfo: [{
              where: "1=0",
              labelExpressionInfo: {
                expression: '$feature.Name + TextFormatting.NewLine + $feature.Description',
              },
              symbol: {
                backgroundColor: [0, 0, 0, .4],
                type: "text",
                color: "#FFFFFF",
                haloColor: "#000000",
                haloSize: 1,
                font: { size: 9 },
              },
              labelPlacement: "above-right",
            }],
          });

          const busStopsLayer = new FeatureLayer({
            visible: false,
            source: [],
            objectIdField: "ObjectID",
            geometryType: "point",
            spatialReference: { wkid: 4326 },
            popupEnabled: false,
            fields: [
              { name: "ObjectID", type: "oid" },
              { name: "StopID", type: "string" },
              { name: "Name", type: "string" },
            ],
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-marker",
                color: "#4fc3f7",
                size: 7,
                outline: { color: "transparent", width: 0 },
              },
            },
            labelingInfo: [{
              where: "1=0",
              labelExpressionInfo: { expression: "$feature.Name" },
              symbol: {
                backgroundColor: [0, 0, 0, .4],
                type: "text",
                color: "#FFFFFF",
                haloColor: "#000000",
                haloSize: 1,
                font: { size: 9 },
              },
              labelPlacement: "above-right",
            }],
          });

          const mapEl = document.getElementById("viewDiv");
          const viewReady = mapEl.viewOnReady();
          let view, map;

          // Load metro lines from GeoJSON
          fetch("/data/metro_lines_processed.geojson")
            .then((res) => res.json())
            .then((geojson) => {
              for (const feature of geojson.features) {
                const lines = feature.properties.lines;
                const coords = feature.geometry.coordinates;

                linesLayer.add(
                  new Graphic({
                    geometry: { type: "polyline", paths: [coords] },
                    symbol: makeLineSymbol(lines),
                  }),
                );
              }
            })
            .catch((err) =>
              console.error("Failed to load metro lines:", err)
            );

          // Load stations
          const stationsByCode = {};
          const stationSearchEl = document.getElementById("stationSearch");

          authFetch("/api/stations")
            .then((res) => res.json())
            .then(async (stations) => {
              const features = stations.map((station, i) =>
                new Graphic({
                  geometry: {
                    type: "point",
                    longitude: station.Lon,
                    latitude: station.Lat,
                  },
                  attributes: {
                    ObjectID: i,
                    Name: station.Name,
                    Code: station.Code,
                    LineCode1: station.LineCode1 || "",
                    LineCode2: station.LineCode2 || "",
                    LineCode3: station.LineCode3 || "",
                    LineCode4: station.LineCode4 || "",
                    Address: station.Address
                      ? `${station.Address.Street}, ${station.Address.City}, ${station.Address.State} ${station.Address.Zip}`
                      : "",
                  },
                })
              );

              const applyEditsPromise = stationsLayer.applyEdits({ addFeatures: features });

              // Populate combobox and lookup map
              const seen = new Set();
              const sorted = [...stations].sort((a, b) => a.Name.localeCompare(b.Name));
              for (const s of sorted) {
                stationsByCode[s.Code] = s;
                if (seen.has(s.Name)) continue;
                seen.add(s.Name);
                const item = document.createElement("calcite-combobox-item");
                item.value = s.Code;
                item.heading = s.Name;
                stationSearchEl.appendChild(item);
              }

              // Restore saved station selection
              const savedStation = showTrains && localStorage.getItem("selectedStation");
              if (savedStation && stationsByCode[savedStation]) {
                stationSearchEl.value = savedStation;
                showArrivals(savedStation);
                await viewReady;
                const layerView = await view.whenLayerView(stationsLayer);
                await applyEditsPromise;
                const results = await stationsLayer.queryFeatures({ returnGeometry: true, where: `Code = '${savedStation}'`})
                const station = results.features[0];
                stationHighlight = layerView.highlight(station);
                view.goTo({ target: station, zoom: 15 }, { duration: 500 });
              }
            })
            .catch((err) => console.error("Failed to load stations:", err));

          // --- OID tracking ---
          let trainOids = {};
          let trainNextOid = 1;
          let busOids = {};
          let busNextOid = 1;

          let selectedStationCode = null;

          // --- WebSocket helpers ---
          const wsProtocol = location.protocol === "https:"
            ? "wss:"
            : "ws:";
          let trainWs = null;
          let busWs = null;
          let trainReconnectTimer = null;
          let trainReconnectDelay = 1000;
          let busReconnectTimer = null;
          let busReconnectDelay = 1000;
          let firstBusesWritePromise;
          const MAX_RECONNECT_DELAY = 30000;

          const trainStatusEl = document.getElementById("trainStatus");
          const busStatusEl = document.getElementById("busStatus");
          const trainsCheckEl = document.querySelector(".trains-check");
          const busesCheckEl = document.querySelector(".buses-check");
          const trainCountEl = document.getElementById("trainCount");
          const busCountEl = document.getElementById("busCount");

          function clearFeatureLayer(layer) {
            layer.queryFeatures().then(result => {
              if (result.features.length > 0) {
                layer.applyEdits({ deleteFeatures: result.features });
              }
            });
          }

          const loaderTimers = new WeakMap();
          function flashLoader(el) {
            el.classList.add("flashing");
            clearTimeout(loaderTimers.get(el));
            loaderTimers.set(el, setTimeout(() => el.classList.remove("flashing"), 1000));
          }

          const setStatus = (el, state) => {
            const labels = {
              live: "live",
              connecting: "connecting...",
              reconnecting: "reconnecting...",
              off: "off",
              disconnected: "disconnected",
            };
            el.title = labels[state] || state;
            el.className = "status " + state;
          };

          const updateCount = (el, oids) => {
            const n = Object.keys(oids).length;
            el.textContent = n > 0 ? `(${n})` : "";
          };

          const updateBusCount = async () => {
            const routeId = busRouteSearchEl.value;
            if (routeId) {
              const count = await busesLayer.queryFeatureCount({ where: `RouteID = '${routeId}'` });
              busCountEl.textContent = count > 0 ? `(${count})` : "";
            } else {
              updateCount(busCountEl, busOids);
            }
          };

          // --- Train connection ---
          const connectTrains = () => {
            if (trainWs) return;
            linesLayer.visible = true;
            stationsLayer.visible = true;
            setStatus(trainStatusEl, "connecting");
            trainWs = new WebSocket(
              `${wsProtocol}//${location.host}/ws/trains?token=${encodeURIComponent(accessToken)}`,
            );

            trainWs.onopen = () => {
              // Clear stale features from previous connection
              clearFeatureLayer(trainsLayer);
              trainOids = {};
              trainReconnectDelay = 1000;
              setStatus(trainStatusEl, "live");
            };

            trainWs.onmessage = (event) => {
              flashLoader(trainStatusEl);
              const { updates, removals } = JSON.parse(event.data);
              const addFeatures = [];
              const updateFeatures = [];
              const deleteFeatures = [];

              for (const train of updates) {
                const graphic = new Graphic({
                  geometry: {
                    type: "point",
                    longitude: train.location.longitude,
                    latitude: train.location.latitude,
                  },
                  attributes: {
                    TrainId: train.TrainId,
                    TrainNumber: train.TrainNumber,
                    CarCount: train.CarCount,
                    DirectionNum: train.DirectionNum,
                    CircuitId: train.CircuitId,
                    DestinationStationCode:
                      train.DestinationStationCode || "",
                    LineCode: train.LineCode || "",
                    SecondsAtLocation: train.SecondsAtLocation,
                    ServiceType: train.ServiceType,
                    Heading: train.heading,
                  },
                });

                if (trainOids[train.TrainId] !== undefined) {
                  graphic.attributes.ObjectID =
                    trainOids[train.TrainId];
                  updateFeatures.push(graphic);
                } else {
                  const oid = trainNextOid++;
                  trainOids[train.TrainId] = oid;
                  graphic.attributes.ObjectID = oid;
                  addFeatures.push(graphic);
                }
              }

              for (const id of removals) {
                if (trainOids[id] !== undefined) {
                  deleteFeatures.push({ objectId: trainOids[id] });
                  delete trainOids[id];
                }
              }

              const edits = {};
              if (addFeatures.length) edits.addFeatures = addFeatures;
              if (updateFeatures.length) edits.updateFeatures = updateFeatures;
              if (deleteFeatures.length) edits.deleteFeatures = deleteFeatures;
              if (addFeatures.length || deleteFeatures.length || updateFeatures.length) {
                trainsLayer.applyEdits(edits);
              }
              updateCount(trainCountEl, trainOids);
            };

            trainWs.onclose = async (event) => {
              trainWs = null;
              if (event.code === 4001) {
                await refreshToken();
                trainReconnectDelay = 1000;
                connectTrains();
                return;
              }
              if (trainsCheckEl.checked) {
                setStatus(trainStatusEl, "reconnecting");
                trainReconnectTimer = setTimeout(() => {
                  trainReconnectTimer = null;
                  connectTrains();
                }, trainReconnectDelay);
                trainReconnectDelay = Math.min(trainReconnectDelay * 2, MAX_RECONNECT_DELAY);
              }
            };

            trainWs.onerror = () => {
              console.error("Train WebSocket error");
            };
          };

          const disconnectTrains = () => {
            if (trainReconnectTimer) {
              clearTimeout(trainReconnectTimer);
              trainReconnectTimer = null;
            }
            trainReconnectDelay = 1000;
            stationsLayer.visible = false;
            linesLayer.visible = false;
            entrancesLayer.visible = false;
            if (trainWs) {
              trainWs.onclose = null;
              trainWs.close();
              trainWs = null;
            }
            clearFeatureLayer(trainsLayer);

            trainOids = {};
            trainNextOid = 1;
            trainCountEl.textContent = "";
            setStatus(trainStatusEl, "off");
          };

          // --- Bus connection ---
          const connectBuses = () => {
            if (busWs) return;
            setStatus(busStatusEl, "connecting");
            busWs = new WebSocket(
              `${wsProtocol}//${location.host}/ws/buses?token=${encodeURIComponent(accessToken)}`,
            );

            busWs.onopen = () => {
              // Clear stale features from previous connection
              clearFeatureLayer(busesLayer);
              busOids = {};
              busReconnectDelay = 1000;
              setStatus(busStatusEl, "live");
            };

            busWs.onmessage = (event) => {
              flashLoader(busStatusEl);
              const { updates, removals } = JSON.parse(event.data);
              const addFeatures = [];
              const updateFeatures = [];
              const deleteFeatures = [];

              for (const bus of updates) {
                const route = busRoutesByID[bus.RouteID];
                const graphic = new Graphic({
                  geometry: {
                    type: "point",
                    longitude: bus.Lon,
                    latitude: bus.Lat,
                  },
                  attributes: {
                    VehicleID: bus.VehicleID,
                    RouteID: bus.RouteID,
                    RouteName: route?.Name || "",
                    LineDescription: route?.LineDescription || "",
                    DirectionText: bus.DirectionText || "",
                    TripHeadsign: bus.TripHeadsign || "",
                    Deviation: bus.Deviation,
                    DateTime: bus.DateTime || "",
                  },
                });

                if (busOids[bus.VehicleID] !== undefined) {
                  graphic.attributes.ObjectID = busOids[bus.VehicleID];
                  updateFeatures.push(graphic);
                } else {
                  const oid = busNextOid++;
                  busOids[bus.VehicleID] = oid;
                  graphic.attributes.ObjectID = oid;
                  addFeatures.push(graphic);
                }
              }

              for (const id of removals) {
                if (busOids[id] !== undefined) {
                  deleteFeatures.push({ objectId: busOids[id] });
                  delete busOids[id];
                }
              }

              const edits = {};
              if (addFeatures.length) edits.addFeatures = addFeatures;
              if (updateFeatures.length) edits.updateFeatures = updateFeatures;
              if (deleteFeatures.length) edits.deleteFeatures = deleteFeatures;
              if (addFeatures.length || updateFeatures.length || deleteFeatures.length) {
                const busPromise = busesLayer.applyEdits(edits);
                if (!firstBusesWritePromise) {
                  firstBusesWritePromise = busPromise;
                }
                busPromise.then(() => updateBusCount());
              } else {
                updateBusCount();
              }
            };

            busWs.onclose = async (event) => {
              busWs = null;
              if (event.code === 4001) {
                await refreshToken();
                busReconnectDelay = 1000;
                connectBuses();
                return;
              }
              if (busesCheckEl.checked) {
                setStatus(busStatusEl, "reconnecting");
                busReconnectTimer = setTimeout(() => {
                  busReconnectTimer = null;
                  connectBuses();
                }, busReconnectDelay);
                busReconnectDelay = Math.min(busReconnectDelay * 2, MAX_RECONNECT_DELAY);
              }
            };

            busWs.onerror = () => {
              console.error("Bus WebSocket error");
            };
          };

          const disconnectBuses = () => {
            if (busReconnectTimer) {
              clearTimeout(busReconnectTimer);
              busReconnectTimer = null;
            }
            busReconnectDelay = 1000;
            if (busWs) {
              busWs.onclose = null;
              busWs.close();
              busWs = null;
            }
            clearFeatureLayer(busesLayer);
            busOids = {};
            busNextOid = 1;
            busCountEl.textContent = "";
            setStatus(busStatusEl, "off");
          };

          // --- Toggle handlers ---
          trainsCheckEl.addEventListener("calciteCheckboxChange", () => {
            localStorage.setItem("showTrains", trainsCheckEl.checked ? "1" : "0");
            if (!trainsCheckEl.checked) {
              localStorage.removeItem("selectedStation");
            }
            if (trainsCheckEl.checked) {
              trainsLayer.visible = true;
              stationSearchEl.style.display = "";
              connectTrains();
            } else {
              trainsLayer.visible = false;
              stationSearchEl.value = "";
              stationSearchEl.style.display = "none";
              cleanupStationSelection();
              if (stationHighlight) {
                stationHighlight.remove();
                stationHighlight = null;
              }
              disconnectTrains();
            }
          });

          busesCheckEl.addEventListener("calciteCheckboxChange", () => {
            localStorage.setItem("showBuses", busesCheckEl.checked ? "1" : "0");
            if (!busesCheckEl.checked) {
              localStorage.removeItem("selectedBusRoute");
            }
            if (busesCheckEl.checked) {
              busesLayer.visible = true;
              busRouteSearchEl.style.display = "";
              connectBuses();
            } else {
              busesLayer.visible = false;
              busRouteSearchEl.value = "";
              busRouteSearchEl.style.display = "none";
              busesLayer.definitionExpression = "1=1";
              clearBusRouteSelection();
              disconnectBuses();
            }
          });

          // --- Bus route filter ---
          const busRouteSearchEl = document.getElementById("busRouteSearch");
          const busRoutesByID = {};

          authFetch("/api/bus-routes")
            .then((res) => res.json())
            .then(async (routes) => {
              for (const r of routes) {
                busRoutesByID[r.RouteID] = r;
              }
              const sorted = [...routes].sort((a, b) => a.RouteID.localeCompare(b.RouteID));
              for (const r of sorted) {
                const item = document.createElement("calcite-combobox-item");
                item.value = r.RouteID;
                item.heading = r.RouteID;
                item.description = r.Name;
                busRouteSearchEl.appendChild(item);
              }

              // Restore saved bus route selection
              const savedRoute = showBuses && localStorage.getItem("selectedBusRoute");
              if (savedRoute && busRoutesByID[savedRoute]) {
                busRouteSearchEl.value = savedRoute;
                busRouteDetailsEl.style.display = "";
                busesLayer.definitionExpression = `RouteID = '${savedRoute}'`;
                // only zoom to buses if trains are not shown
                if (!showTrains) {
                  await viewReady;
                  await firstBusesWritePromise;
                  const results = await busesLayer.queryFeatures({ returnGeometry: true, where: `RouteID = '${savedRoute}'`})
                  const buses = results.features;
                  view.goTo({ target: buses }, { duration: 500 });
                }
              }
            })
            .catch((err) => console.error("Failed to load bus routes:", err));

          const busRouteDetailsEl = document.getElementById("busRouteDetails");
          const busStopsToggle = document.getElementById("busStopsToggle");

          const clearBusRouteSelection = () => {
            clearFeatureLayer(busStopsLayer);
            busStopsLayer.visible = false;
            busStopsToggle.checked = false;
            busRouteDetailsEl.style.display = "none";
          };

          const zoomToFilteredBuses = async () => {
            const routeId = busRouteSearchEl.value;
            if (!routeId) return;
            const layerView = await view.whenLayerView(busesLayer);
            await reactiveUtils.whenOnce(() => !layerView.updating);
            const result = await busesLayer.queryFeatures({
              where: `RouteID = '${routeId}'`,
              returnGeometry: true,
            });
            if (result.features.length > 0) {
              view.goTo(result.features, { duration: 500 });
            }
          };

          function closeKeyboard(combobox) {
            const shadowInput = combobox?.shadowRoot?.querySelector("input");
            if (shadowInput) shadowInput.blur();
            combobox?.blur();
            const sink = document.getElementById("keyboard-dismiss");
            sink?.focus();
            sink?.blur();
          }

          // Dismiss mobile keyboard after combobox dropdown closes
          // (calciteComboboxClose fires after Calcite finishes focus management)
          stationSearchEl.addEventListener("calciteComboboxClose", () => closeKeyboard(stationSearchEl));
          busRouteSearchEl.addEventListener("calciteComboboxClose", () => closeKeyboard(busRouteSearchEl));

          busRouteSearchEl.addEventListener("calciteComboboxChange", (e) => {
            clearBusRouteSelection();
            const routeId = busRouteSearchEl.value;
            if (!routeId) {
              localStorage.removeItem("selectedBusRoute");
              busesLayer.definitionExpression = "1=1";
              updateBusCount();
              return;
            }
            localStorage.setItem("selectedBusRoute", routeId);
            busRouteDetailsEl.style.display = "";
            busesLayer.definitionExpression = `RouteID = '${routeId}'`;
            updateBusCount();
            zoomToFilteredBuses();
          });

          // Bus stops toggle
          busStopsToggle.addEventListener("calciteSwitchChange", () => {
            if (!busStopsToggle.checked) {
              clearFeatureLayer(busStopsLayer);
              busStopsLayer.visible = false;
              return;
            }
            const routeId = busRouteSearchEl.value;
            if (!routeId) return;
            authFetch(`/api/bus-stops?routeId=${encodeURIComponent(routeId)}`)
              .then((res) => res.json())
              .then((stops) => {
                if (stops.length === 0) return;
                const features = stops.map((s) =>
                  new Graphic({
                    geometry: {
                      type: "point",
                      longitude: s.Lon,
                      latitude: s.Lat,
                    },
                    attributes: {
                      StopID: s.StopID,
                      Name: s.Name,
                    },
                  })
                );
                busStopsLayer.visible = true;
                busStopsLayer.applyEdits({ addFeatures: features });
                view.goTo(features);
              })
              .catch((err) => console.error("Failed to load bus stops:", err));
          });

          // Go to filtered buses
          document.getElementById("gotoBusRoute").addEventListener("click", () => {
            if (!busRouteSearchEl.value) return;
            zoomToFilteredBuses();
          });

          // --- Bottom sheet drag logic ---
          const sheetEl = document.querySelector(".panel-holder");
          const handleEl = document.querySelector(".sheet-handle");
          let sheetCleanup = null;
          let currentSnap = "min";
          const SNAP_ORDER = ["peek", "min", "mid", "max", "full"];

          function cssVarPx(name) {
            const val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            if (val.endsWith("vh")) return window.innerHeight * parseFloat(val) / 100;
            return parseFloat(val);
          }

          function sheetSnaps() {
            return {
              peek: cssVarPx("--sheet-peek"),
              min: cssVarPx("--sheet-min"),
              mid: cssVarPx("--sheet-mid"),
              max: cssVarPx("--sheet-max"),
              full: cssVarPx("--sheet-full"),
            };
          }

          function setSheetHeight(px, animate = false) {
            sheetEl.style.transition = animate ? "height 200ms ease-out" : "";
            sheetEl.style.height = `${px}px`;
          }

          function snapSheet(target, animate = true) {
            const snaps = sheetSnaps();
            currentSnap = target;
            setSheetHeight(snaps[target], animate);
          }

          function makeSheetDraggable() {
            // Clean up previous listeners if any
            if (sheetCleanup) sheetCleanup();

            let startY = 0;
            let startH = 0;
            let dragging = false;
            let lastY = 0;
            let lastTime = 0;
            let velocity = 0;

            function onDown(e) {
              dragging = true;
              handleEl.setPointerCapture(e.pointerId);
              startY = e.clientY;
              startH = sheetEl.getBoundingClientRect().height;
              lastY = e.clientY;
              lastTime = Date.now();
              velocity = 0;
              sheetEl.style.transition = "";
              handleEl.style.cursor = "grabbing";
            }

            function onMove(e) {
              if (!dragging) return;
              const now = Date.now();
              const dt = now - lastTime;
              if (dt > 0) velocity = (lastY - e.clientY) / dt; // px/ms, positive = up
              lastY = e.clientY;
              lastTime = now;

              const snaps = sheetSnaps();
              const dy = startY - e.clientY;
              const next = Math.max(snaps.peek, Math.min(snaps.full, startH + dy));
              setSheetHeight(next);
            }

            function onUp() {
              if (!dragging) return;
              dragging = false;
              handleEl.style.cursor = "grab";

              const h = sheetEl.getBoundingClientRect().height;
              const snaps = sheetSnaps();
              const FLICK = 0.4; // px/ms threshold

              let target;
              if (velocity > FLICK) {
                // Flick up: go to next snap above current height
                target = SNAP_ORDER.find(s => snaps[s] > h + 10) || "full";
              } else if (velocity < -FLICK) {
                // Flick down: go to next snap below current height
                target = [...SNAP_ORDER].reverse().find(s => snaps[s] < h - 10) || "peek";
              } else {
                // No flick: snap to nearest
                target = SNAP_ORDER.reduce((a, b) =>
                  Math.abs(snaps[a] - h) <= Math.abs(snaps[b] - h) ? a : b
                );
              }

              snapSheet(target);
            }

            handleEl.addEventListener("pointerdown", onDown);
            window.addEventListener("pointermove", onMove);
            window.addEventListener("pointerup", onUp);
            window.addEventListener("pointercancel", onUp);

            sheetCleanup = () => {
              handleEl.removeEventListener("pointerdown", onDown);
              window.removeEventListener("pointermove", onMove);
              window.removeEventListener("pointerup", onUp);
              window.removeEventListener("pointercancel", onUp);
              sheetCleanup = null;
            };
          }

          /** Expand sheet to at least mid if currently below mid. */
          function sheetExpandIfNeeded() {
            if (!smallScreenQuery.matches) return;
            if (currentSnap === "peek" || currentSnap === "min" || currentSnap === "mid") snapSheet("max");
          }

          const smallScreenQuery = window.matchMedia("(max-width: 768px)");

          function handleSmallScreen(e) {
            if (e.matches) {
              makeSheetDraggable();
            } else {
              if (sheetCleanup) sheetCleanup();
              sheetEl.style.height = "auto";
              sheetEl.style.transition = "";
            }
          }

          // --- Station click: entrances & arrivals ---
          const stationDetails = document.getElementById("stationDetails");
          const arrivalsContainer = document.getElementById("arrivalsContainer");

          let selectedTrain;
          let handlingSelection = false;

          let arrivalsWs = null;
          let activeHighlight = null;
          let stationHighlight = null;

          const handleArrivalSelection = async (list) => {
            if (handlingSelection) return;
            handlingSelection = true;
            arrivalsContainer.querySelectorAll("calcite-list").forEach(otherList => {
              if (otherList !== list) {
                for (const item of [...otherList.selectedItems]) {
                  item.selected = false;
                }
              }
            });
            handlingSelection = false;

            const selected = list.selectedItems;
            if (selected.length === 0) {
              selectedTrain = null;
              activeHighlight?.remove();
              return;
            }
            selectedTrain = selected[0].value;
            const arrival = selected[0]._arrival;
            if (!arrival?.TrainId) return;

            activeHighlight?.remove();

            const result = await trainsLayer.queryFeatures({
              where: `TrainId = '${arrival.TrainId}'`,
              returnGeometry: true,
            });

            if (result.features.length === 0) return;

            const target = result.features[0];
            view.goTo({ target: target.geometry, zoom: Math.max(view.zoom, 14) }, { duration: 400 });

            const layerView = await view.whenLayerView(trainsLayer);
            activeHighlight = layerView.highlight(target);
          };

          const renderArrivals = (grouped) => {
            arrivalsContainer.innerHTML = "";
            const codes = Object.keys(grouped);
            const isMultiCode = codes.length > 1;

            for (const code of codes) {
              const arrivals = grouped[code];

              const station = stationsByCode[code];
              const header = document.createElement("div");
              header.style.cssText = "display:flex; align-items:center; gap:4px; padding:8px 12px 4px; font-size:13px; color:#aaa;";
              const lineCodes = [station?.LineCode1, station?.LineCode2, station?.LineCode3, station?.LineCode4].filter(Boolean);
              for (const lc of lineCodes) {
                const dot = document.createElement("span");
                dot.className = "arrival-line";
                dot.style.background = LINE_COLORS[lc] || "#888";
                header.appendChild(dot);
              }
              const label = document.createElement("span");
              label.textContent = lineCodes.map(lc => LINE_NAMES[lc] || lc).join(" \u00b7 ");
              header.appendChild(label);
              arrivalsContainer.appendChild(header);

              const list = document.createElement("calcite-list");
              list.setAttribute("selection-mode", "single");

              for (const a of arrivals) {
                const color = LINE_COLORS[a.Line] || "#888";
                const item = document.createElement("calcite-list-item");
                item.label = `${a.Destination || "Unknown"}`;
                const minuteDescription = a.Min === "" || a.Min === "—" || a.Min === "ARR" || a.Min === "BRD" ? a.Min : `${a.Min} min`;
                item.description = `${a.Car || "?"} cars · ${minuteDescription}`;
                item.innerHTML = `<span slot="content-start" class="arrival-line" style="background:${color}"></span>`;
                item._arrival = a;
                item.value = a.TrainId;
                list.appendChild(item);
                item.selected = selectedTrain && selectedTrain === a.TrainId;
              }

              if (arrivals.length === 0) {
                const item = document.createElement("calcite-list-item");
                item.label = "No upcoming arrivals";
                list.appendChild(item);
              }

              list.addEventListener("calciteListChange", () => handleArrivalSelection(list));
              arrivalsContainer.appendChild(list);
            }
          };

          const entrancesToggle = document.getElementById("entrancesToggle");

          const cleanupStationSelection = () => {
            // Clear entrances and reset toggle
            clearFeatureLayer(entrancesLayer);
            entrancesLayer.visible = false;
            entrancesToggle.checked = false;
            // Close arrivals WebSocket
            if (arrivalsWs) {
              arrivalsWs.onclose = null;
              arrivalsWs.close();
              arrivalsWs = null;
            }
            // Hide station details
            stationDetails.style.display = "none";
            arrivalsContainer.innerHTML = "";
            selectedStationCode = null;
            selectedTrain = null;

            if (activeHighlight) {
              activeHighlight.remove();
              activeHighlight = null;
            }
          };

          const showArrivals = (code) => {
            selectedStationCode = code;
            stationDetails.style.display = "";
            arrivalsContainer.innerHTML = "";
            sheetExpandIfNeeded();

            arrivalsWs = new WebSocket(
              `${wsProtocol}//${location.host}/ws/arrivals/${encodeURIComponent(code)}?token=${encodeURIComponent(accessToken)}`
            );
            arrivalsWs.onmessage = (event) => {
              flashLoader(trainStatusEl);
              if (selectedStationCode !== code) return;
              const arrivals = JSON.parse(event.data);
              renderArrivals(arrivals);
            };
            arrivalsWs.onclose = async (event) => {
              if (event.code === 4001 && selectedStationCode === code) {
                await refreshToken();
                arrivalsWs = null;
                showArrivals(code);
              }
            };
            arrivalsWs.onerror = () => {
              console.error("Arrivals WebSocket error");
            };
          };

          // Station combobox search
          stationSearchEl.addEventListener("calciteComboboxChange", (e) => {
            if (stationHighlight) {
              stationHighlight.remove();
              stationHighlight = null;
            }
            const code = stationSearchEl.value;
            cleanupStationSelection();
            if (!code) {
              localStorage.removeItem("selectedStation");
              return;
            }
            localStorage.setItem("selectedStation", code);
            const station = stationsByCode[code];
            if (!station) return;

            // Zoom and highlight the station feature
            stationsLayer.queryFeatures({ returnGeometry: true, where: `Code = '${code}'` }).then(async (result) => {
              if (result.features.length === 0) return;
              const feature = result.features[0];
              view.goTo({ target: feature.geometry, zoom: 15 }, { duration: 500 });
              const layerView = await view.whenLayerView(stationsLayer);
              stationHighlight = layerView.highlight(feature);
            });

            showArrivals(code);
          });

          // Entrances toggle
          entrancesToggle.addEventListener("calciteSwitchChange", () => {
            if (!entrancesToggle.checked) {
              clearFeatureLayer(entrancesLayer);
              entrancesLayer.visible = false;
              return;
            }
            const station = stationsByCode[selectedStationCode];
            if (!station) return;
            const { Lat: latitude, Lon: longitude } = station;

            authFetch(`/api/entrances?lat=${latitude}&lon=${longitude}&radius=500`)
              .then(res => res.json())
              .then(entrances => {
                if (entrances.length === 0) return;
                const features = entrances.map(e =>
                  new Graphic({
                    geometry: {
                      type: "point",
                      longitude: e.Lon,
                      latitude: e.Lat,
                    },
                    attributes: {
                      Name: e.Name,
                      Description: e.Description,
                    },
                  })
                );
                entrancesLayer.visible = true;
                entrancesLayer.applyEdits({ addFeatures: features });
                view.goTo(features);
              })
              .catch(err => console.error("Failed to load entrances:", err));
          });

          // Go to station button
          document.getElementById("gotoStation").addEventListener("click", () => {
            const station = stationsByCode[selectedStationCode];
            if (!station) return;
            view.goTo({ target: [station.Lon, station.Lat], zoom: 15 }, { duration: 500 });
          });

          // --- View-dependent initialization ---
          async function initView() {
            await viewReady;
            view = mapEl.view;
            map = mapEl.map;

            // show bus stops and station entrances label on mouseover
            const onPointer = async e => {
              const hits = await view.hitTest(e);
              const { results } = hits;
              const entrancesHits = results.filter(r => r.type === "graphic" && r.layer === entrancesLayer);
              const stopsHits = results.filter(r => r.type === "graphic" && r.layer === busStopsLayer);
              if (entrancesHits.length) {
                entrancesLayer.labelingInfo[0].where = entrancesHits.map(result => `ObjectID = ${result.graphic.attributes.ObjectID}`).join(" OR ");
              }
              else {
                entrancesLayer.labelingInfo[0].where = "1=0";
              }

              if (stopsHits.length) {
                busStopsLayer.labelingInfo[0].where = stopsHits.map(result => `ObjectID = ${result.graphic.attributes.ObjectID}`).join(" OR ");
              }
              else {
                busStopsLayer.labelingInfo[0].where = "1=0";
              }
            }

            // Only add pointer handles when the relevant layers are visible
            let pointerHandles = [];
            reactiveUtils.watch(() => [entrancesLayer.visible, busStopsLayer.visible], (visibility) => {
              const [entrancesVisible, busStopsVisible] = visibility;
              if (entrancesVisible || busStopsVisible && pointerHandles.length === 0) {
                pointerHandles.push(view.on("pointer-move", debounce(onPointer, 50)), view.on("pointer-down", debounce(onPointer, 25)))
              }
              else {
                pointerHandles.forEach(h => h.remove());
                pointerHandles = [];
              }
            })

            map.add(linesLayer);
            map.add(stationsLayer);
            map.add(entrancesLayer);
            map.add(busRouteLayer);
            map.add(busStopsLayer);
            map.add(busesLayer);
            map.add(trainsLayer);

            view.popup.visible = false;
            view.popup.collapsed = true;
            view.popup.dockEnabled = true;
            view.popup.dockOptions = {
              position: "bottom-right",
              breakpoint: false,
            };
            view.constraints = {
              minZoom: 8,
              geometry: {
                type: "extent",
                spatialReference: { wkid: 102100 },
                xmin: -8629219.7,
                ymin: 4677858.1,
                xmax: -8544476.9,
                ymax: 4748981.5,
              },
            };

            handleSmallScreen(smallScreenQuery);
            smallScreenQuery.addEventListener("change", handleSmallScreen);

            const aboutNotice = document.querySelector("#aboutNotice");
            if (!localStorage.getItem("aboutDismissed")) {
              aboutNotice.open = true;
              aboutNotice.style.display = "block";
            }
            aboutNotice.addEventListener("calciteNoticeClose", () => {
              localStorage.setItem("aboutDismissed", "1");
            });

            // handle popup feature...not used for now
            // reactiveUtils.watch(() => view.popup?.selectedFeature, (feature) => {
            //   if (!feature) return;
            // });
          }

          // --- Initial connections (restore saved preferences) ---
          const savedTrains = localStorage.getItem("showTrains");
          const savedBuses = localStorage.getItem("showBuses");
          const showTrains = savedTrains !== null ? savedTrains === "1" : true;
          const showBuses = savedBuses !== null ? savedBuses === "1" : false;

          if (showTrains) {
            trainsCheckEl.checked = true;
            connectTrains();
          } else {
            trainsCheckEl.checked = false;
            trainsLayer.visible = false;
            stationsLayer.visible = false;
            linesLayer.visible = false;
            entrancesLayer.visible = false;
            stationSearchEl.style.display = "none";
            setStatus(trainStatusEl, "off");
          }

          if (showBuses) {
            busesCheckEl.checked = true;
            busesLayer.visible = true;
            busRouteSearchEl.style.display = "";
            connectBuses();
            // switch to buses tab if trains are not on
            if (!showTrains) {
              document.querySelector(".bus-tab-title").setAttribute("selected", true);
            }
          }

          // --- Visibility change: close sockets when hidden, reopen when visible ---
          let hiddenByVisibility = false;

          document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
              hiddenByVisibility = true;
              // Silently close all WebSockets (null onclose to prevent reconnect logic)
              if (trainReconnectTimer) {
                clearTimeout(trainReconnectTimer);
                trainReconnectTimer = null;
              }
              if (trainWs) {
                trainWs.onclose = null;
                trainWs.close();
                trainWs = null;
              }
              if (busReconnectTimer) {
                clearTimeout(busReconnectTimer);
                busReconnectTimer = null;
              }
              if (busWs) {
                busWs.onclose = null;
                busWs.close();
                busWs = null;
              }
              if (arrivalsWs) {
                arrivalsWs.onclose = null;
                arrivalsWs.close();
                arrivalsWs = null;
              }
            } else if (hiddenByVisibility) {
              hiddenByVisibility = false;
              // Reconnect based on current state
              if (trainsCheckEl.checked) connectTrains();
              if (busesCheckEl.checked) connectBuses();
              if (selectedStationCode) showArrivals(selectedStationCode);
            }
          });

          initView();
    </script>
  </body>
</html>
